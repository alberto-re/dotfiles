# Palette and formats largely taken from:
# https://github.com/rose-pine/starship/blob/main/rose-pine.toml
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$directory\
$git_branch\
$nodejs\
$python\
$rust\
$status
$character"""

palette = "rose-pine"
command_timeout = 2000

[palettes.rose-pine]
overlay = '#26233a'
rose = '#ebbcba'
pine = '#31748f'
foam = '#9ccfd8'
iris = '#c4a7e7'

[username]
disabled = false
format = "[оӮ¶](fg:overlay)[\ue0cf $user]($style)[оӮҙ](fg:overlay) "
show_always = true
style_root = "bg:overlay fg:foam"
style_user = "bg:overlay fg:foam"

[directory]
format = "[оӮ¶](fg:overlay)[$path]($style)[оӮҙ](fg:overlay) "
style = "bg:overlay fg:iris"
fish_style_pwd_dir_length = 1

[git_branch]
format = "[оӮ¶](fg:overlay)[$symbol $branch]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:rose"
symbol = "пҗҳ"

[nodejs]
style = "bg:overlay fg:pine"
format = " [оӮ¶](fg:overlay)[$symbol$version]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = "у°Һҷ "

[python]
style = "bg:overlay fg:pine"
format = " [оӮ¶](fg:overlay)[$symbol$version]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = 'оңј '

[rust]
style = "bg:overlay fg:pine"
format = " [оӮ¶](fg:overlay)[$symbol$version]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = "оһЁ "

[character]
success_symbol = '[ уұһӘ](fg:foam)'
error_symbol = '[ уұһӘ](fg:rose)'
